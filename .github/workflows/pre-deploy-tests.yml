name: Pre-Deploy Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm ci
      # Type-check gate: Vite builds WITHOUT type-checking, so type errors used to
      # ship green. tsc --noEmit fails the pipeline on any type error.
      - run: npm run type-check
      # Build gate: catch bundler/import breakage before deploy.
      - run: npm run build
