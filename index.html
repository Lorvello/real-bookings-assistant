<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings Assistant - AI-Powered WhatsApp Booking Automation</title>
    <meta name="description" content="Automate your bookings with AI-powered WhatsApp integration. Perfect for beauty salons, healthcare, and consultants. Reduce no-shows and save time." />
    <meta name="author" content="Bookings Assistant" />
    <meta name="keywords" content="booking automation, WhatsApp booking, appointment scheduling, beauty salon software, healthcare booking, AI assistant" />

    <!-- PWA / home-screen icons (R12 P3-PWA-ICONS: icon-192/512 + apple-touch-icon
         now exist as real files in public/, derived from the app's own calendar +
         WhatsApp logo mark on the dark canvas brand background). -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0B0D11" />

    <!-- Security Headers -->
    <!-- X-Content-Type-Options / X-XSS-Protection / Permissions-Policy: browsers DO honor these via
         <meta http-equiv>, so they stay here as a client-side backstop. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <!-- X-Frame-Options REMOVED from here (R13 T3-B2 / RUX-9): browsers refuse to honor X-Frame-Options via
         <meta http-equiv>, per the HTML spec and every browser vendor. It can ONLY be set as a real HTTP
         response header, so this tag never provided any clickjacking protection, it only produced a console
         warning ("X-Frame-Options may only be set via an HTTP header, not inside <meta>.") on every page load.
         Real protection now lives in vercel.json's `headers` config, applied by Vercel as an actual HTTP
         response header on every route. -->

    <!-- Content Security Policy will be set by productionSecurity.ts -->
    
    <!-- Cache Control Hints -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
    
    <!-- Resource Hints for Performance -->
    <link rel="preconnect" href="https://cdn.voiceflow.com">
    <!-- Google Fonts preconnects removed — Inter Variable + EB Garamond are now self-hosted (bundled), so there is no external font origin to warm up. -->
    <link rel="preconnect" href="https://grdgjhkygzciwwrxgvgy.supabase.co">
    <link rel="preconnect" href="https://randomuser.me">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bookingsassistant.com" />
    <meta property="og:site_name" content="Bookings Assistant" />
    <meta property="og:title" content="Bookings Assistant - AI-Powered WhatsApp Booking Automation" />
    <meta property="og:description" content="Automate your bookings with AI-powered WhatsApp integration. Perfect for beauty salons, healthcare, and consultants." />
    <meta property="og:image" content="https://bookingsassistant.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bookings Assistant - AI-Powered WhatsApp Booking Automation" />
    <meta name="twitter:description" content="Automate your bookings with AI-powered WhatsApp integration. Perfect for beauty salons, healthcare, and consultants." />
    <meta name="twitter:image" content="https://bookingsassistant.com/og-image.png" />
    
  </head>

  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
